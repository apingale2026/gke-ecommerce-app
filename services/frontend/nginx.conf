server {
    listen 80;

    # serve the React frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # proxy /api/products → product-api service in K8s
    location /api/products {
        proxy_pass         http://product-api-service.backend.svc.cluster.local:5000/products;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # proxy /api/auth → auth-service in K8s
    location /api/auth/ {
        proxy_pass         http://auth-service-service.backend.svc.cluster.local:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # health check for K8s liveness probe
    location /health {
        return 200 '{"status":"ok","service":"frontend"}';
        add_header Content-Type application/json;
    }
}
