<!DOCTYPE html>
<html>
<head>
  <title>GKE Ecommerce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #f5f5f5; }
    nav { background: #1a73e8; color: white; padding: 16px 24px;
          display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 20px; }
    .auth { display: flex; gap: 8px; }
    .auth input { padding: 6px 10px; border-radius: 4px; border: none; }
    .auth button { padding: 6px 14px; border-radius: 4px; border: none;
                   background: white; color: #1a73e8; cursor: pointer; font-weight: 500; }
    main { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    h2 { margin-bottom: 16px; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { background: white; border-radius: 8px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card h3 { margin-bottom: 8px; color: #222; }
    .price { font-size: 20px; font-weight: bold; color: #1a73e8; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #666; }
    #msg { margin: 12px 0; padding: 10px 14px; border-radius: 6px; display: none; }
    .ok  { background: #e8f5e9; color: #2e7d32; }
    .err { background: #ffebee; color: #c62828; }
    #status { font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>

<nav>
  <h1>GKE Ecommerce</h1>
  <div class="auth">
    <input id="username" placeholder="username" type="text"/>
    <input id="password" placeholder="password" type="password"/>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <span id="status"></span>
  </div>
</nav>

<main>
  <div id="msg"></div>
  <h2>Products</h2>
  <div class="grid" id="products">
    <p>Loading...</p>
  </div>
</main>

<script>
  function showMsg(text, ok) {
    var el = document.getElementById("msg");
    el.textContent = text;
    el.className = ok ? "ok" : "err";
    el.style.display = "block";
    setTimeout(function() { el.style.display = "none"; }, 3000);
  }

  // Load products
  fetch("/api/products")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var html = "";
      for (var i = 0; i < data.length; i++) {
        var p = data[i];
        html += '<div class="card">';
        html += '<h3>' + p.name + '</h3>';
        html += '<div class="price">₹' + p.price.toLocaleString() + '</div>';
        html += '<div class="desc">' + (p.description || "") + '</div>';
        html += '</div>';
      }
      document.getElementById("products").innerHTML = html;
    })
    .catch(function() {
      document.getElementById("products").innerHTML = "<p>Could not load products</p>";
    });

  function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;
    if (!username || !password) { showMsg("Enter username and password", false); return; }
    fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.token) {
        document.getElementById("status").textContent = "✓ " + username;
        document.getElementById("status").style.color = "white";
        showMsg("Login successful!", true);
      } else {
        showMsg(data.error || "Login failed", false);
      }
    })
    .catch(function() { showMsg("Auth service error", false); });
  }

  function register() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;
    if (!username || !password) { showMsg("Enter username and password", false); return; }
    fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      showMsg(data.message || data.error, !!data.message);
    })
    .catch(function() { showMsg("Auth service error", false); });
  }
</script>
</body>
</html>
